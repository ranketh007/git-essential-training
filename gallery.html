    <script>
        const gallery = document.querySelectorAll(".contentbox");

        gallery.forEach(function(box){
            const background = box.querySelector(".background");
            const content = box.querySelector(".contentboxContent");

            box.addEventListener("mouseenter", function(){
                background.style.filter = "blur(3px)";
                background.style.cursor = "pointer";
                content.style.opacity = "1";
                content.style.cursor = "pointer";
            });

            box.addEventListener("mouseleave", function(){
                background.style.filter = "none";
                content.style.opacity = "0";
            });   

        });

    </script>

    <script>
        const gallery1 = document.querySelector(".contentbox:nth-child(1)");
        const background = gallery1.querySelector(".background");
        const content = gallery1.querySelector(".contentboxContent");
        background.style.filter= "none";
        background.style.opacity= "1";
        gallery1.addEventListener("click", function(){
            this.classList.toggle("contentboxExpanded");
            if(this.classList.contains("contentboxExpanded")){
                gallery1.style.width = "95%";
                background.style.filter = "none";
                content.innerHTML=`
                <section class="expandedContent">
                    <h3>The Rich Diveristy of Ocean Life</h3>
                    <p>Being home to an incredibly variety of life, including from planktons to massive blue whales, marine ecosystems play a crucial role in maintaining
                        ecological balance. A popular ecosystem would be coral reefs.</p>
                    <ul>
                        <li>Coral reefs provide shelter and breeding grounds</li>
                        <li>Oceans regulate global climate</li>
                        <li>Marine species contribute to food security</li>
                    </ul>
                    <label for="selected">Customize the Font Style</label>
                    <select class="fontSelect" id="selected">
                        <option value="Georgia">Default (Georgia)</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Arial">Arial</option>
                        <option value="Poppins">Poppins</option>
                    </select><br>
                    <label for="dark">Configure Theme</label>
                    <button type="submit" id="dark">Dark Mode</button>
                    <button type="submit" value="Default" id="default">Default</button>
                </section>`;

                const fontDrop = content.querySelector(".fontSelect");

                /*Selectors targetting paragraphs, list elements and headings*/
                const head3 = gallery1.querySelector("h3");
                const para = gallery1.querySelector("p");
                const listElement = gallery1.querySelector("ul");

                fontDrop.addEventListener("click", function(event){
                    event.stopPropagation(); /*Stops the expanded content from collapsing when clicking on interactive elements*/

                    head3.style.fontFamily = this.value;
                    para.style.fontFamily = this.value;
                    listElement.style.fontFamily = this.value;
                });

                const darkbtn = content.querySelector("#dark");
                const overlay = gallery1.querySelector(".overlay");

                darkbtn.addEventListener("click", function(event){
                    event.stopPropagation();

                    overlay.style.backgroundColor = "#00171f";
                });

                const defaultbtn = content.querySelector("#default");

                defaultbtn.addEventListener("click", function(){
                    event.stopPropagation();

                    overlay.style.backgroundColor = "transparent";
                });

            }else{
                content.innerHTML = `
                <h2>Show More on</h2>
                <h3>Marine Biodiversity</h3>`;
                gallery1.style.width = "50%";
                background.style.backgroundColor = "none";
            }
        });

    </script>
